name: bees4ever sync and build

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: Build and push images even if release branch did not change
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync-main:
    name: Sync main from upstream
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        run: |
          git remote add upstream https://github.com/microsoft/playwright.git
          git fetch upstream main
          git merge upstream/main --no-edit

      - name: Push main
        run: git push origin main

  sync-release:
    name: Sync release branch from upstream
    needs: sync-main
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      workflows: write
    outputs:
      sync_ok: ${{ steps.merge.outputs.sync_ok }}
      updated: ${{ steps.merge.outputs.updated }}
      release_branch: ${{ steps.config.outputs.release_branch }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read config
        id: config
        run: |
          release_branch="$(sed -n 's/^release_branch: *//p' bees4ever/config.yml | tr -d ' \r')"
          echo "release_branch=${release_branch}" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream and release branch
        run: |
          git remote add upstream https://github.com/microsoft/playwright.git
          git fetch upstream "${{ steps.config.outputs.release_branch }}"
          git fetch origin "${{ steps.config.outputs.release_branch }}" || true

      - name: Checkout release branch
        run: |
          branch="${{ steps.config.outputs.release_branch }}"
          git checkout -B "${branch}" "origin/${branch}"

      - name: Merge upstream release branch
        id: merge
        run: |
          branch="${{ steps.config.outputs.release_branch }}"
          before="$(git rev-parse HEAD)"
          if ! git merge "upstream/${branch}" --no-edit; then
            echo "sync_ok=false" >> "$GITHUB_OUTPUT"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          after="$(git rev-parse HEAD)"
          git push origin "${branch}"
          echo "sync_ok=true" >> "$GITHUB_OUTPUT"
          if [[ "${before}" != "${after}" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

  build-docker:
    name: Build and publish Docker images
    needs: sync-release
    if: >-
      (needs.sync-release.outputs.sync_ok == 'true' &&
       needs.sync-release.outputs.updated == 'true') ||
      (needs.sync-release.outputs.sync_ok == 'true' &&
       inputs.force_build == true)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.sync-release.outputs.release_branch }}
          fetch-depth: 0

      - name: Install bees4ever tooling from main
        run: |
          git fetch origin main
          mkdir -p bees4ever
          git show origin/main:bees4ever/config.yml > bees4ever/config.yml
          git show origin/main:bees4ever/build.sh > bees4ever/build.sh
          chmod +x bees4ever/build.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 22
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - run: npm ci
      - run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push py3.13
        run: ./bees4ever/build.sh py3.13 --push

      - name: Build and push py3.14
        run: ./bees4ever/build.sh py3.14 --push
