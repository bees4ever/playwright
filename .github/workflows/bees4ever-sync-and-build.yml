name: bees4ever sync and build

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: Build and push images even if release branch did not change
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  sync-main:
    name: Sync main from upstream
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream main
        run: |
          git remote add upstream https://github.com/microsoft/playwright.git
          git fetch upstream main
          git merge upstream/main --no-edit

      - name: Push main
        env:
          BEES4EVER_GITHUB_TOKEN: ${{ secrets.BEES4EVER_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash bees4ever/configure-git-push.sh
          git push origin main

  sync-release:
    name: Sync release branch from upstream
    needs: sync-main
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      sync_ok: ${{ steps.merge.outputs.sync_ok }}
      updated: ${{ steps.merge.outputs.updated }}
      release_branch: ${{ steps.config.outputs.release_branch }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read config
        id: config
        run: |
          release_branch="$(sed -n 's/^release_branch: *//p' bees4ever/config.yml | tr -d ' \r')"
          echo "release_branch=${release_branch}" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream and release branch
        run: |
          git remote add upstream https://github.com/microsoft/playwright.git
          git fetch upstream "${{ steps.config.outputs.release_branch }}"
          git fetch origin "${{ steps.config.outputs.release_branch }}" || true

      - name: Checkout release branch
        run: |
          branch="${{ steps.config.outputs.release_branch }}"
          git checkout -B "${branch}" "origin/${branch}"

      - name: Merge upstream release branch
        id: merge
        env:
          BEES4EVER_GITHUB_TOKEN: ${{ secrets.BEES4EVER_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          branch="${{ steps.config.outputs.release_branch }}"
          before="$(git rev-parse HEAD)"
          if ! git merge "upstream/${branch}" --no-edit; then
            echo "sync_ok=false" >> "$GITHUB_OUTPUT"
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          after="$(git rev-parse HEAD)"
          git show origin/main:bees4ever/configure-git-push.sh > /tmp/configure-git-push.sh
          bash /tmp/configure-git-push.sh
          git push origin "${branch}"
          echo "sync_ok=true" >> "$GITHUB_OUTPUT"
          if [[ "${before}" != "${after}" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

  build-docker:
    name: Build ${{ matrix.variant }} (${{ matrix.arch }})
    needs: sync-release
    if: >-
      (needs.sync-release.outputs.sync_ok == 'true' &&
       needs.sync-release.outputs.updated == 'true') ||
      (needs.sync-release.outputs.sync_ok == 'true' &&
       inputs.force_build == true)
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: py3.13
            arch: amd64
            runner: ubuntu-22.04
          - variant: py3.13
            arch: arm64
            runner: ubuntu-22.04-arm
          - variant: py3.14
            arch: amd64
            runner: ubuntu-22.04
          - variant: py3.14
            arch: arm64
            runner: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.sync-release.outputs.release_branch }}
          fetch-depth: 0

      - name: Install bees4ever tooling from main
        run: |
          git fetch origin main
          mkdir -p bees4ever/docker
          git show origin/main:bees4ever/config.yml > bees4ever/config.yml
          git show origin/main:bees4ever/build.sh > bees4ever/build.sh
          git show origin/main:bees4ever/docker-templates/Dockerfile.noble-py3.13 > bees4ever/docker/Dockerfile.noble-py3.13
          git show origin/main:bees4ever/docker-templates/Dockerfile.noble-py3.14 > bees4ever/docker/Dockerfile.noble-py3.14
          git show origin/main:bees4ever/docker-templates/.gitignore > bees4ever/docker/.gitignore
          chmod +x bees4ever/build.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 22
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - run: npm ci
      - run: npm run build

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: ./bees4ever/build.sh ${{ matrix.variant }} --push --${{ matrix.arch }}

  publish-manifest:
    name: Publish multi-arch manifests
    needs: [sync-release, build-docker]
    if: >-
      (needs.sync-release.outputs.sync_ok == 'true' &&
       needs.sync-release.outputs.updated == 'true') ||
      (needs.sync-release.outputs.sync_ok == 'true' &&
       inputs.force_build == true)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.sync-release.outputs.release_branch }}
          fetch-depth: 0

      - name: Install bees4ever tooling from main
        run: |
          git fetch origin main
          mkdir -p bees4ever
          git show origin/main:bees4ever/config.yml > bees4ever/config.yml
          git show origin/main:bees4ever/publish-manifest.sh > bees4ever/publish-manifest.sh
          chmod +x bees4ever/publish-manifest.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish py3.13 manifest
        run: ./bees4ever/publish-manifest.sh py3.13

      - name: Publish py3.14 manifest
        run: ./bees4ever/publish-manifest.sh py3.14
